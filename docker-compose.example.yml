services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: banks-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - banks-net

  nginx:
    image: nginx:alpine
    container_name: banks-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8002}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - banks-net

  mysql:
    image: mysql:8.4
    container_name: banks-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-banks}
      MYSQL_USER: ${DB_USERNAME:-banks}
      MYSQL_PASSWORD: ${DB_PASSWORD:-banks}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - banks-mysql-data:/var/lib/mysql
    networks:
      - banks-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: banks-redis
    restart: unless-stopped
    volumes:
      - banks-redis-data:/data
    networks:
      - banks-net

  horizon:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: banks-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - banks-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: banks-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - banks-net

networks:
  banks-net:
    driver: bridge

volumes:
  banks-mysql-data:
  banks-redis-data:
